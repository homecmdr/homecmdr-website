base_url = "https://homecmdr.dev"
title = "HomeCmdr"
description = "Local home automation built for tinkerers and agents. Adapter-driven, Lua-scriptable, AI-ready."
default_language = "en"
compile_sass = false
minify_html = true
generate_feeds = false
build_search_index = false

[markdown]
highlight_code = true
highlight_theme = "base16-ocean-dark"
smart_punctuation = false

[extra]
github_org = "https://github.com/homecmdr"
repo_api = "https://github.com/homecmdr/homecmdr-api"
repo_cli = "https://github.com/homecmdr/homecmdr-cli"
repo_dash = "https://github.com/homecmdr/homecmdr-dash"
repo_adapters = "https://github.com/homecmdr/adapters"

nav = [
  { label = "Installation", url = "/installation/" },
  { label = "Docs",         url = "/docs/" },
  { label = "Developers",   url = "/developers/" },
  { label = "GitHub",       url = "https://github.com/homecmdr/homecmdr-api", external = true },
]
